name: Bug Report
description: Report a bug to help us fix it
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: Brief description of the bug
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        I expected X to happen, but instead Y happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Create a Blockchain with...
        2. Add a block with...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Stack Trace (if applicable)
      render: java

  - type: input
    id: java_version
    attributes:
      label: Java Version
      placeholder: "e.g., 17, 21"
    validations:
      required: true

  - type: input
    id: maven_version
    attributes:
      label: Maven Version
      placeholder: "e.g., 3.9.0"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched for similar issues
          required: true
        - label: This is a bug, not a question
          required: true
