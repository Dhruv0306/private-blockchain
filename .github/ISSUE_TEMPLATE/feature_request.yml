name: Feature Request
description: Suggest an enhancement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide details below.

  - type: input
    id: title
    attributes:
      label: Feature Title
      placeholder: Brief summary of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: |
        Currently, we cannot... This makes it difficult to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: |
        Add a new ConsensusEngine implementation that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This aligns with project goals
          required: false
        - label: This doesn't duplicate existing issues
          required: true
